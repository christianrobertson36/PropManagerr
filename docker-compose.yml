services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: propmanager
      POSTGRES_USER: propmanager
      POSTGRES_PASSWORD: change-this-db-password
    volumes:
      - propmanager_db:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propmanager -d propmanager"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: postgres://propmanager:change-this-db-password@db:5432/propmanager
      JWT_SECRET: change-this-long-random-secret
      CORS_ORIGIN: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  propmanager_db:
